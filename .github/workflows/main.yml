name: Build_AndUEDumper_Final_Attempt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build
        run: |
          # 1. 定位到 Android.mk 所在的目录
          MK_PATH=$(find . -name "Android.mk" -print -quit)
          BUILD_DIR=$(dirname "$MK_PATH")
          cd "$BUILD_DIR"

          # 2. 这里的 NDK 路径是 GitHub 预装的最新版
          $ANDROID_NDK_LATEST_HOME/ndk-build \
            APP_ABI=arm64-v8a \
            APP_PLATFORM=android-26 \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Dumper_Output
          path: "**/libs/arm64-v8a/*"
