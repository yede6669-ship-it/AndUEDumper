name: Build AndUEDumper

on:
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 使用官方/主流 Action 安装 NDK
      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          # 针对 UE4.27，建议使用 r21e 或 r25c 保证兼容性
          ndk-version: "25.2.9519653" 

      - name: Build with ndk-build
        run: |
          # 确保进入包含 Android.mk 的目录
          cd jni 
          $ANDROID_NDK_HOME/ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=Android.mk

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: AndUEDumper-ARM64
          path: jni/libs/arm64-v8a/
