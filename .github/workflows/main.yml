      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # 关键点：递归拉取所有依赖的子模块 (submodules)
          submodules: recursive

      - name: Build ARM64 Binary
        run: |
          # 1. 递归寻找 Android.mk
          MK_PATH=$(find . -name "Android.mk" -print -quit)
          BUILD_DIR=$(dirname "$MK_PATH")
          cd "$BUILD_DIR"

          # 2. 检查 KittyMemory 是否存在，若不存在则尝试手动修复常见路径
          # 有的游戏项目将其放在 ../KittyMemory 或内部的 KittyMemory 文件夹
          if [ ! -f "src/UE/KittyMemoryMgr.hpp" ] && [ ! -d "KittyMemory" ]; then
            echo "警告：未检测到 KittyMemory 依赖，尝试从 GitHub 紧急拉取..."
            git clone https://github.com/mircodezorzi/KittyMemory.git
          fi

          # 3. 执行编译
          $ANDROID_NDK_LATEST_HOME/ndk-build \
            APP_ABI=arm64-v8a \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            -j$(nproc)
