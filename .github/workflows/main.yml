name: Build UE427 Dumper

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 强制指定 Node.js 24 环境，消除弃用中断
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 直接使用原生 sdkmanager 安装 NDK，避开有问题的第三方 Action
      - name: Install NDK r25c
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
          echo "NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Run NDK Build
        run: |
          # 检查项目目录
          if [ ! -d "jni" ]; then
            echo "Error: 'jni' folder not found. Please check your repository structure."
            exit 1
          fi
          
          cd jni
          # 调用刚才安装的 NDK 进行编译
          $NDK_HOME/ndk-build \
            APP_ABI=arm64-v8a \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            NDK_APPLICATION_MK=Application.mk

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AndUEDumper-Binary
          # 确保路径指向 ndk-build 生成的可执行文件位置
          path: jni/libs/arm64-v8a/
