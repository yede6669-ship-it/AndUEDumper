name: Build_AndUEDumper_427_Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        # 移除 submodules: recursive 以免在 checkout 阶段就报错退出

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Dependencies
        run: |
          # 1. 定位 AndUEDumper 目录 (根据你之前的日志是 ./AndUEDumper)
          TARGET_DIR="./AndUEDumper"
          
          # 2. 清理可能存在的空目录，手动下载 KittyMemory
          rm -rf "$TARGET_DIR/KittyMemory"
          mkdir -p "$TARGET_DIR/KittyMemory"
          
          # 3. 使用带有 Token 注入的 URL 或者直接拉取 Zip（最稳的方式）
          echo "正在下载 KittyMemory 核心组件..."
          curl -L https://github.com/mircodezorzi/KittyMemory/archive/refs/heads/master.tar.gz | tar xz -C "$TARGET_DIR/KittyMemory" --strip-components=1
          
          # 4. 验证文件是否存在
          if [ -f "$TARGET_DIR/KittyMemory/KittyMemoryMgr.hpp" ]; then
             echo "KittyMemory 组件部署成功。"
          else
             # 尝试在更深一层的目录检查（处理嵌套 AndUEDumper/AndUEDumper 情况）
             DEEP_DIR="./AndUEDumper/AndUEDumper"
             if [ -d "$DEEP_DIR" ]; then
                mkdir -p "$DEEP_DIR/KittyMemory"
                curl -L https://github.com/mircodezorzi/KittyMemory/archive/refs/heads/master.tar.gz | tar xz -C "$DEEP_DIR/KittyMemory" --strip-components=1
             fi
          fi

      - name: Execute NDK Build
        run: |
          # 动态寻找 Android.mk
          MK_PATH=$(find . -name "Android.mk" -print -quit)
          BUILD_DIR=$(dirname "$MK_PATH")
          cd "$BUILD_DIR"

          $ANDROID_NDK_LATEST_HOME/ndk-build \
            APP_ABI=arm64-v8a \
            APP_PLATFORM=android-26 \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            -j$(nproc)

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: AndUEDumper_Final
          path: "**/libs/arm64-v8a/*"
