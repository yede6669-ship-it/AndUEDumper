name: Build AndUEDumper

on:
  workflow_dispatch: # 允许手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: nndixon/setup-android-ndk@v1
        with:
          ndk-version: r25c # 建议使用 r25c 以上版本以支持 UE4.27 编译需求

      - name: Build with ndk-build
        run: |
          cd jni
          ndk-build APP_ABI=arm64-v8a

      - name: Upload Result
        uses: actions/upload-artifact@v3
        with:
          name: AndUEDumper-Binary
          path: libs/arm64-v8a/
