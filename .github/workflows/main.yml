name: UE427_Dumper_Build

on:
  workflow_dispatch: # 手动触发

jobs:
  build_dumper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 官方 v4 已适配新版 Node

      - name: Build ARM64 Binary
        run: |
          # 1. 检查并进入目录
          if [ -d "jni" ]; then
            cd jni
          fi

          # 2. 检查关键构建文件是否存在
          if [ ! -f "Android.mk" ]; then
            echo "错误: 在当前目录未找到 Android.mk，请检查项目结构。"
            exit 1
          fi

          # 3. 使用 GitHub 预装的最稳 NDK 版本路径
          # 通常路径为 /usr/local/lib/android/sdk/ndk-bundle 或 $ANDROID_NDK_LATEST_HOME
          $ANDROID_NDK_LATEST_HOME/ndk-build \
            APP_ABI=arm64-v8a \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            NDK_APPLICATION_MK=Application.mk \
            -j$(nproc)

      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: UE427_Dumper_ARM64
          # 这里的路径必须与 ndk-build 生成的位置一致
          path: "**/libs/arm64-v8a/*"
