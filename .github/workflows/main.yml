name: Build_AndUEDumper_427_Ultimate

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. 下载主仓库代码 (AndUEDumper)
      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          path: main_repo

      # 2. 下载依赖仓库代码 (KittyMemory)
      - name: Checkout KittyMemory
        uses: actions/checkout@v4
        with:
          repository: mircodezorzi/KittyMemory
          path: kitty_temp

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Organize and Build
        run: |
          # 1. 定位 AndUEDumper 源码所在的目录
          MK_PATH=$(find main_repo -name "Android.mk" -print -quit)
          BUILD_DIR=$(dirname "$MK_PATH")
          echo "检测到构建目录: $BUILD_DIR"
          
          # 2. 将 KittyMemory 移动到源码目录下，确保编译器能找到
          # 创建 KittyMemory 目标文件夹并把刚才下载的代码移进去
          mkdir -p "$BUILD_DIR/KittyMemory"
          cp -r kitty_temp/* "$BUILD_DIR/KittyMemory/"
          
          # 3. 验证关键头文件位置
          if [ -f "$BUILD_DIR/KittyMemory/KittyMemoryMgr.hpp" ]; then
             echo "KittyMemory 部署成功。"
          else
             echo "错误：KittyMemory 部署失败！"
             exit 1
          fi

          # 4. 执行 NDK 编译
          cd "$BUILD_DIR"
          $ANDROID_NDK_LATEST_HOME/ndk-build \
            APP_ABI=arm64-v8a \
            APP_PLATFORM=android-26 \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            -j$(nproc)

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: AndUEDumper_Release
          path: "main_repo/**/libs/arm64-v8a/*"
