name: Build AndUEDumper 2026_Stable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 强制启用 Node.js 24 运行环境，跳过弃用检查
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # 避免 Android SDK 交互式许可确认阻塞进程
      ANDROID_SDK_TOOLS_REVISIONS: "34.0.0"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # v4 已原生支持 Node.js 20+

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 使用官方提供的 cmdline-tools 安装方式，避开不稳定的第三方 ndk-action
      - name: Install Android NDK r25c
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
          echo "NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Execute NDK Build
        run: |
          # 检查 jni 目录是否存在
          if [ ! -d "jni" ]; then
            echo "Error: Directory 'jni' not found in repository root."
            exit 1
          fi
          
          # 执行编译
          cd jni
          $NDK_HOME/ndk-build \
            APP_ABI=arm64-v8a \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            NDK_APPLICATION_MK=Application.mk || exit 1

      - name: Archive and Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: UE427-Dumper-ARM64
          path: jni/libs/arm64-v8a/
