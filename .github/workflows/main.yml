name: Build AndUEDumper

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 解决图片中的 Node.js 20 弃用警告，强制使用 Node.js 24
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 修复：使用正确的方式安装 SDK 组件
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;25.2.9519653' # 通过 packages 参数安装特定版本的 NDK

      - name: Build with ndk-build
        run: |
          # 定义 NDK 路径（setup-android 会将 SDK 放在 $ANDROID_SDK_ROOT）
          export NDK_PATH=$ANDROID_SDK_ROOT/ndk/25.2.9519653
          cd jni
          $NDK_PATH/ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=Android.mk

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: AndUEDumper-ARM64
          path: jni/libs/arm64-v8a/
