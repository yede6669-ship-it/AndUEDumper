name: Build_AndUEDumper_427

on:
  workflow_dispatch: # 支持手动点击 Run workflow 触发

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 强制使用 Node 24 运行环境，适配 2026 年新规
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build ARM64 Binary
        run: |
          # 1. 递归寻找 Android.mk 所在的目录
          MK_PATH=$(find . -name "Android.mk" -print -quit)
          if [ -z "$MK_PATH" ]; then
            echo "错误：在仓库中未找到 Android.mk 文件！"
            ls -R
            exit 1
          fi
          
          # 获取该文件所在的文件夹路径
          BUILD_DIR=$(dirname "$MK_PATH")
          echo "检测到构建目录: $BUILD_DIR"
          cd "$BUILD_DIR"

          # 2. 调用系统预装的最稳 NDK 路径进行编译
          # 增加 -j$(nproc) 利用多核加速编译
          $ANDROID_NDK_LATEST_HOME/ndk-build \
            APP_ABI=arm64-v8a \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            -j$(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AndUEDumper_ARM64_Release
          # 自动寻找所有生成的 libs 目录下的二进制文件
          path: "**/libs/arm64-v8a/*"
          if-no-files-found: error
